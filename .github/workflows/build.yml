name: Build Steamless

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    
    - name: Restore NuGet packages
      run: nuget restore Steamless.sln
    
    - name: Build Steamless
      run: msbuild Steamless.sln /p:Configuration=Release /p:Platform="Any CPU" /m
    
    - name: List build output (debug)
      run: |
        echo "=== Listing all bin folders ==="
        Get-ChildItem -Path . -Recurse -Directory -Filter "bin" | ForEach-Object { $_.FullName }
        echo "=== Listing Release folders ==="
        Get-ChildItem -Path . -Recurse -Directory -Filter "Release" | ForEach-Object { $_.FullName }
      shell: pwsh
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Steamless-Build
        path: |
          **/bin/Release/**/*.exe
          **/bin/Release/**/*.dll
          **/bin/Release/**/*.config
        if-no-files-found: warn
